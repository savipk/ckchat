spring:
  datasource:
    url: jdbc:sqlite:data/juno.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    azure:
      openai:
        api-key: ${AZURE_OPENAI_API_KEY:}
        endpoint: ${AZURE_OPENAI_ENDPOINT:}
        chat:
          options:
            deployment-name: ${AZURE_OPENAI_DEPLOYMENT_NAME:gpt-4o}
            temperature: 0.7

server:
  port: 8080

juno:
  cors:
    allowed-origins: ${JUNO_CORS_ORIGINS:http://localhost:8084,http://localhost:4000}
  agents:
    config-path: classpath:agents/*.md
  data:
    path: classpath:data/
  conversation:
    max-messages-before-summarization: 10
    messages-to-keep-after-summarization: 5
    profile-low-completion-threshold: 50

logging:
  level:
    com.juno: DEBUG
    org.springframework.ai: INFO
