# Pre-commit hooks — aligned with cloud env (talent-marketplace-be devfile)
# Install: python3 -m pip install pre-commit && pre-commit install --hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: spotless-check
        name: Spotless Java formatting check
        entry: bash -c 'cd backend && ./mvnw spotless:check -q'
        language: system
        files: '\.java$'
        pass_filenames: false
